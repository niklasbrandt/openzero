# openZero Configuration
# Copy this file to `config.yaml` to customize the behavior of your AI Operating System.
# This file allows you to toggle features on/off and adjust the scheduling (turnus) of background tasks.

# ------------------------------------------------------------------------------
# 1. Feature Toggles
# ------------------------------------------------------------------------------
features:
  # Core Interfaces
  messenger_bot: true # Enable the Messenger Bot interface (e.g., Telegram)
  whatsapp_bot: false # Enable the WhatsApp Cloud API channel (requires WHATSAPP_* vars in .env)
  task_board_integration: false # Enable Planka Kanban board syncing and task creation

  # External Integrations
  email_monitoring: false # Enable reading and summarizing unread emails
  calendar_monitoring: false # Enable checking your calendar for upcoming events

  # Experimental / Future Integrations
  weather_briefing: false # Include daily weather forecast in morning briefing
  financial_monitoring: false # Include budget/expense tracking in weekly review

# ------------------------------------------------------------------------------
# 2. Schedules & Time Turnus
# ------------------------------------------------------------------------------
schedules:
  # Recurring Briefings & Reviews
  morning_briefing:
    enabled: true
    time: "07:30" # 24-hour format
    days: "mon-fri" # "mon-fri", "all", "mon,wed,fri", etc.

  weekly_review:
    enabled: true
    time: "10:00"
    day: "sun" # Day of the week to send the weekly review

  monthly_review:
    enabled: true
    time: "10:00"
    date: "1" # Day of the month to send the big-picture review

  # Background Polling Intervals (in minutes)
  email_polling_interval_minutes: 10
  calendar_sync_interval_minutes: 15
  task_board_sync_interval_minutes: 5

# ------------------------------------------------------------------------------
# 3. System Preferences
# ------------------------------------------------------------------------------
preferences:
  timezone: "auto" # Dynamically determined based on where you are or will be (via calendar)
  language: "en" # Agent language for responses and reports

  # Behavior & Thresholds
  max_emails_per_briefing: 10 # Max number of emails to explicitly summarize
  stagnation_warning_days: 14 # Warn if a project card hasn't moved in X days

  # Note: AI engine selection (local llama-server) and models are configured in .env

# ------------------------------------------------------------------------------
# 4. Intelligence Configuration
# ------------------------------------------------------------------------------
intelligence:
  # 2-Tier architecture: local / cloud
  # Tier routing is automatic based on message complexity.
  # Override defaults in .env (LLM_MODEL_LOCAL, LLM_CLOUD_BASE_URL, etc.)

  # First-token timeout (seconds) before escalating local → cloud
  cloud_timeout_seconds: 2

  # Whether to attempt cloud routing for interactive messages
  # Set to false for fully air-gapped / offline deployments
  smart_cloud_routing: true

  # PII sanitisation for outbound cloud LLM calls.
  # Strips named entities (people, locations, emails) via offline spaCy NER before
  # prompts leave the VPS; re-hydrates tokens in the response.  Off by default
  # to avoid false-positives on non-personal payloads.  Enable for personal data.
  # Corresponds to env var CLOUD_LLM_SANITIZE.
  cloud_llm_sanitize: false

  # Minimum cosine similarity score (0.0–1.0) for a Qdrant memory result to be
  # injected into the chat prompt context.  Results below this threshold are
  # silently discarded.  Raise to reduce topically unrelated memory leakage;
  # lower if relevant memories are being missed.
  # Corresponds to env var MEMORY_MIN_SCORE. Default 0.72.
  memory_min_score: 0.72

# ------------------------------------------------------------------------------
# 5. Self-Audit
# ------------------------------------------------------------------------------
self_audit:
  # How many hours between full self-audit runs.
  # Each run checks action fulfillment, possible contradictions, and Planka redundancy.
  interval_hours: 6

  # The Planka project whose boards represent the user's personal projects.
  # When set, the audit flags any user project that was created as a top-level
  # Planka project instead of as a board under this parent.
  # Set to "" to disable the placement check.
  my_projects_parent: "My Projects"

  # How many hours back to scan Z's stored messages when running an audit (periodic or on-demand).
  # Corresponds to env var AUDIT_LOOKBACK_HOURS. Default 48 covers two full days of activity.
  lookback_hours: 48

# ── Ambient Capture & Contextual Routing ───────────────────────────────────
# See docs/artifacts/ambient_capture_routing.md for the full architectural plan.
# Epoch 1 ships dark — the engine code is in place but no message path
# invokes it until enabled is true (Epoch 2). Single-user / single-tenant only;
# multi-user flows are explicitly disabled until re-audited (Section 18).
ambient_capture:
  # Single-user operator identity. REQUIRED before enabling — engine refuses
  # to start without it. Set to your Planka user id (string).
  # Corresponds to env var OPERATOR_USER_ID.
  operator_user_id: ""

  # Master kill-switch. When false, the deterministic intent router runs
  # exactly as before and ambient routing never fires. Default false.
  enabled: false

  # Per-channel opt-in. Each channel is independently controlled.
  channels:
    telegram: false
    whatsapp: false
    dashboard: false

  # Pending capture TTL (seconds, 10..600). How long Z waits for a
  # clarification reply before silently forgetting the proposed capture.
  pending_ttl_seconds: 90

  # Confidence thresholds (0.0..1.0). Defaults match the "Confident butler"
  # preset from Section 7 of the artifact.
  thresholds:
    silent_floor: 0.80
    ask_floor: 0.45
    chat_floor: 0.20

  # Comma-separated extra domains the auto-description sanitiser allows in
  # addition to wikipedia.org / youtube.com.
  auto_description_allowed_domains: ""

  # Routing-lesson retention in days. 0 = never expire (default).
  routing_lesson_retention_days: 0

# ── Ambient Intelligence (State-Diff Engine) ────────────────────────────────
# See docs/artifacts/ambient_intelligence.md for the full architectural plan.
# Separate from ambient_capture (which routes inbound user messages).
# This engine reacts to observed state changes and fires crews proactively.
# All settings are optional; the feature ships dark (enabled: false).
ambient_intelligence:
  # Master switch. Enable after validating P0 behaviour in logs.
  # Corresponds to env var AMBIENT_ENABLED.
  enabled: false

  # How often (seconds) the engine snapshots all data sources.
  # Default 300 (5 minutes). Minimum recommended: 60.
  poll_interval_s: 300

  # Minutes of user silence before a quiet-moment delivery is attempted.
  quiet_moment_window_m: 15

  # Maximum triggers delivered per hour across all rules.
  # Prevents alert fatigue even if many rules fire simultaneously.
  max_triggers_per_hour: 3

  # Fold undelivered priority 4-5 insights into the morning briefing.
  briefing_queue_enabled: true

