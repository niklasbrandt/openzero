<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openZero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8f9fa;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .container {
            z-index: 10;
            text-align: center;
            max-width: 400px;
            padding: 48px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-box {
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        .logo-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 600;
            color: var(--accent-blue);
            box-shadow: 0 0 30px var(--accent-glow);
            animation: pulse-logo 4s infinite ease-in-out;
        }

        @keyframes pulse-logo {
            0% {
                box-shadow: 0 0 20px var(--accent-glow);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 0 50px var(--accent-glow);
                transform: scale(1.05);
            }

            100% {
                box-shadow: 0 0 20px var(--accent-glow);
                transform: scale(1);
            }
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 40px;
            justify-items: center;
        }

        .status-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }

        .status-node.active {
            opacity: 1;
        }

        .status-icon {
            width: 24px;
            height: 24px;
            color: var(--text-secondary);
            transition: color 0.5s ease;
        }

        .active .status-icon {
            color: var(--accent-blue);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            position: relative;
        }

        .active .dot {
            background: var(--accent-blue);
        }

        .active .dot::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .loader-bar {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1px;
            margin-top: 48px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-blue);
            animation: slide 2.5s infinite ease-in-out;
            border-radius: 1px;
        }

        @keyframes slide {
            0% {
                left: -30%;
                width: 30%;
            }

            50% {
                left: 40%;
                width: 40%;
            }

            100% {
                left: 100%;
                width: 30%;
            }
        }

        .refresh-sync {
            margin-top: 32px;
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
            opacity: 0.3;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-box">
            <div class="logo-circle">Z</div>
        </div>

        <div class="status-grid">
            <!-- Core Services Node -->
            <div class="status-node active" id="node-core">
                <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                <div class="dot"></div>
            </div>

            <!-- Memory Node -->
            <div class="status-node" id="node-memory">
                <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                </svg>
                <div class="dot"></div>
            </div>

            <!-- Intelligence Node -->
            <div class="status-node" id="node-llm">
                <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                    <rect x="9" y="9" width="6" height="6"></rect>
                    <line x1="9" y1="1" x2="9" y2="4"></line>
                    <line x1="15" y1="1" x2="15" y2="4"></line>
                    <line x1="9" y1="20" x2="9" y2="23"></line>
                    <line x1="15" y1="20" x2="15" y2="23"></line>
                    <line x1="20" y1="9" x2="23" y2="9"></line>
                    <line x1="20" y1="15" x2="23" y2="15"></line>
                    <line x1="1" y1="9" x2="4" y2="9"></line>
                    <line x1="1" y1="15" x2="4" y2="15"></line>
                </svg>
                <div class="dot"></div>
            </div>
        </div>

        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>

        <svg class="refresh-sync" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"></path>
            <path d="M3 12a9 9 0 0115-6.7L21 8"></path>
            <path d="M3 22v-6h6"></path>
            <path d="M21 12a9 9 0 01-15 6.7L3 16"></path>
        </svg>
    </div>

    <script>
        // Automatic reconnection attempt
        async function checkStatus() {
            try {
                // Progressively activate nodes visually to show movement
                const nodes = ['node-memory', 'node-llm'];
                const randomNode = nodes[Math.floor(Math.random() * nodes.length)];
                document.getElementById(randomNode).classList.add('active');
                setTimeout(() => {
                    const el = document.getElementById(randomNode);
                    if (el) el.classList.remove('active');
                }, 1500);

                const response = await fetch('/api/dashboard/system', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok || response.status === 401) {
                    window.location.href = '/';
                }
            } catch (err) {
                // Quietly keep trying
            }
        }

        setInterval(checkStatus, 3000);
    </script>
</body>

</html>
