<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openZero</title>
    <style>
        :root {
            --bg-color: #05070a;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --glass-bg: rgba(10, 12, 16, 0.8);
            --text-primary: #f8f9fa;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Border Animation Container */
        .border-glow {
            position: relative;
            padding: 2px;
            border-radius: 42px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .border-glow::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent,
                    transparent,
                    transparent,
                    var(--accent-blue));
            animation: rotate 4s linear infinite;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 380px;
            padding: 56px 48px;
            background: var(--bg-color);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 40px;
            font-weight: 200;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            margin-bottom: 56px;
            text-shadow: 0 0 20px var(--accent-glow);
            animation: fadeIn 1.2s ease-out;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            justify-items: center;
        }

        .status-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0.3;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-node.active {
            opacity: 1;
            transform: translateY(-4px);
        }

        .status-icon {
            width: 28px;
            height: 28px;
            color: var(--text-secondary);
            transition: color 0.6s ease;
        }

        .active .status-icon {
            color: var(--accent-blue);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            position: relative;
        }

        .active .dot {
            background: var(--accent-blue);
        }

        .active .dot::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }

            100% {
                transform: scale(3.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="border-glow">
        <div class="container">
            <h1>openZero</h1>

            <div class="status-grid">
                <!-- Core Services Node -->
                <div class="status-node" id="node-core">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                    </svg>
                    <div class="dot"></div>
                </div>

                <!-- Memory Node -->
                <div class="status-node" id="node-memory">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                    </svg>
                    <div class="dot"></div>
                </div>

                <!-- Intelligence Node -->
                <div class="status-node" id="node-llm">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                        <rect x="9" y="9" width="6" height="6"></rect>
                        <line x1="9" y1="1" x2="9" y2="4"></line>
                        <line x1="15" y1="1" x2="15" y2="4"></line>
                        <line x1="9" y1="20" x2="9" y2="23"></line>
                        <line x1="15" y1="20" x2="15" y2="23"></line>
                        <line x1="20" y1="9" x2="23" y2="9"></line>
                        <line x1="20" y1="15" x2="23" y2="15"></line>
                        <line x1="1" y1="9" x2="4" y2="9"></line>
                        <line x1="1" y1="15" x2="4" y2="15"></line>
                    </svg>
                    <div class="dot"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const nodes = ['node-core', 'node-memory', 'node-llm'];
        let currentIndex = 0;

        function cycleNodes() {
            // Remove active from all
            nodes.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('active');
            });

            // Add active to current
            const currentEl = document.getElementById(nodes[currentIndex]);
            if (currentEl) currentEl.classList.add('active');

            // Move to next
            currentIndex = (currentIndex + 1) % nodes.length;
        }

        // Initial cycle
        cycleNodes();
        setInterval(cycleNodes, 2000);

        async function checkStatus() {
            try {
                const response = await fetch('/api/dashboard/system', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok || response.status === 401) {
                    window.location.href = '/';
                }
            } catch (err) {
                // Keep waiting
            }
        }

        setInterval(checkStatus, 3000);
    </script>
</body>

</html>
