<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>openZero</title>
	<style>
		:root {
			--bg-color: #05070a;
			--accent-blue: #3b82f6;
			--accent-glow: rgba(59, 130, 246, 0.4);
			--text-primary: #f8f9fa;
			--text-secondary: #94a3b8;
		}
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background-color: var(--bg-color);
			color: var(--text-primary);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
			overflow: hidden;
			position: relative;
		}
		body::before {
			content: '';
			position: absolute;
			top: 20%; left: 20%;
			width: 40vw; height: 40vw;
			background: radial-gradient(circle, var(--glow-color, var(--accent-glow)) 0%, transparent 70%);
			filter: blur(80px);
			z-index: 0; opacity: 0.5; pointer-events: none;
		}
		.border-glow {
			position: relative; padding: 2px; border-radius: 26px;
			background: rgba(255,255,255,0.03);
			display: flex; align-items: center; justify-content: center;
			overflow: hidden; animation: fadeIn 1s ease-out;
			box-shadow: 0 20px 50px rgba(0,0,0,0.5);
		}
		@keyframes rotate {
			from { transform: translate(-50%,-50%) rotate(0deg); }
			to   { transform: translate(-50%,-50%) rotate(360deg); }
		}
		.border-glow::before {
			content: ''; position: absolute; top: 50%; left: 50%;
			width: 800px; height: 800px;
			background: conic-gradient(transparent, transparent, transparent, var(--spin-color, var(--accent-blue)));
			animation: rotate 4s linear infinite;
		}
		.container {
			position: relative; z-index: 10; text-align: center;
			width: 380px; padding: 56px 48px;
			background: var(--bg-color); border-radius: 24px;
		}
		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(20px); }
			to   { opacity: 1; transform: translateY(0); }
		}
		.wordmark {
			font-size: 22px; font-weight: 200; letter-spacing: 0.12em;
			color: var(--text-secondary); text-transform: uppercase;
			margin-bottom: 32px; animation: fadeIn 1.2s ease-out;
		}
		.status-code {
			font-size: 72px; font-weight: 100; letter-spacing: -0.04em;
			line-height: 1; margin-bottom: 12px;
			animation: fadeIn 1s ease-out 0.1s both;
		}
		.status-label {
			font-size: 13px; font-weight: 500; letter-spacing: 0.18em;
			text-transform: uppercase; color: var(--text-secondary);
			margin-bottom: 40px; animation: fadeIn 1s ease-out 0.2s both;
		}
		.status-grid {
			display: grid; grid-template-columns: repeat(3, 1fr);
			gap: 24px; justify-items: center;
		}
		.status-node {
			display: flex; flex-direction: column; align-items: center;
			gap: 16px; opacity: 0.3;
			transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
		}
		.status-node.active { opacity: 1; transform: translateY(-4px); }
		.status-icon { width: 28px; height: 28px; color: var(--text-secondary); transition: color 0.6s ease; }
		.active .status-icon { color: var(--accent-blue); filter: drop-shadow(0 0 8px var(--accent-glow)); }
		.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); position: relative; }
		.active .dot { background: var(--accent-blue); }
		.active .dot::after {
			content: ''; position: absolute;
			top: -4px; left: -4px; right: -4px; bottom: -4px;
			border-radius: 50%; border: 2px solid var(--accent-blue);
			animation: ripple 2s infinite;
		}
		@keyframes ripple {
			0%   { transform: scale(0.5); opacity: 1; }
			100% { transform: scale(3.5); opacity: 0; }
		}
		@media (prefers-reduced-motion: reduce) {
			*, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
		}
	</style>
</head>

<body>
	<div class="border-glow">
		<div class="container">
			<div class="wordmark">openZero</div>
			<div class="status-code" id="status-code" aria-live="polite">---</div>
			<div class="status-label" id="status-label"></div>

			<!-- 5xx: animated service nodes while system recovers -->
			<div class="status-grid" id="node-grid" hidden>
				<div class="status-node" id="node-core">
					<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
					</svg>
					<div class="dot"></div>
				</div>
				<div class="status-node" id="node-memory">
					<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
						<path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
						<path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
					</svg>
					<div class="dot"></div>
				</div>
				<div class="status-node" id="node-llm">
					<svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
						<rect x="9" y="9" width="6" height="6"></rect>
						<line x1="9" y1="1" x2="9" y2="4"></line>
						<line x1="15" y1="1" x2="15" y2="4"></line>
						<line x1="9" y1="20" x2="9" y2="23"></line>
						<line x1="15" y1="20" x2="15" y2="23"></line>
						<line x1="20" y1="9" x2="23" y2="9"></line>
						<line x1="20" y1="15" x2="23" y2="15"></line>
						<line x1="1" y1="9" x2="4" y2="9"></line>
						<line x1="1" y1="15" x2="4" y2="15"></line>
					</svg>
					<div class="dot"></div>
				</div>
			</div>

		</div>
	</div>

	<script>
		var STATUS_LABELS = {
			400: 'Bad Request', 401: 'Unauthorized', 403: 'Forbidden',
			404: 'Not Found', 405: 'Method Not Allowed', 408: 'Request Timeout',
			409: 'Conflict', 410: 'Gone', 429: 'Too Many Requests',
			500: 'Internal Server Error', 502: 'Bad Gateway',
			503: 'Service Unavailable', 504: 'Gateway Timeout'
		};
		var code = parseInt(new URLSearchParams(window.location.search).get('status') || '0', 10);
		var is5xx = code >= 500 && code < 600;
		document.getElementById('status-code').textContent = code || '';
		document.getElementById('status-label').textContent =
			STATUS_LABELS[code] || (is5xx ? 'Server Error' : code >= 400 ? 'Client Error' : '');
		if (is5xx) {
			document.documentElement.style.setProperty('--glow-color', 'rgba(239,68,68,0.35)');
			document.documentElement.style.setProperty('--spin-color', '#ef4444');
			document.getElementById('status-code').style.color = '#ef4444';
			document.getElementById('node-grid').removeAttribute('hidden');
			var ids = ['node-core', 'node-memory', 'node-llm'], i = 0;
			function cycle() {
				ids.forEach(function(id) { document.getElementById(id).classList.remove('active'); });
				document.getElementById(ids[i]).classList.add('active');
				i = (i + 1) % ids.length;
			}
			cycle(); setInterval(cycle, 2000);
			setInterval(async function() {
				try {
					var r = await fetch('/api/dashboard/system', { headers: { Accept: 'application/json' } });
					if (r.ok || r.status === 401) window.location.href = '/';
				} catch(_) {}
			}, 3000);
		} else {
			document.getElementById('status-code').style.color = '#3b82f6';
		}
	</script>
</body>

</html>
