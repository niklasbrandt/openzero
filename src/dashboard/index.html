	<main id="main-content">
		<div id="app">
			<header class="dashboard-header">
				<h1>openZero <span class="gradient-text">Dashboard</span></h1>
				<div class="header-actions" role="toolbar" aria-label="Quick actions">
					<a href="/api/dashboard/planka-redirect?target=operator" target="_blank"
						rel="noopener noreferrer"
						class="planka-btn operator-btn"
						aria-label="Open Operator Board — centralized overview of tasks (opens in new tab)"
						data-tooltip="Centralized overview of tasks across all your boards">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
							<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
						</svg>
						<span>Operator Board</span>
					</a>
					<a href="/api/dashboard/planka-redirect" target="_blank"
						rel="noopener noreferrer"
						class="planka-btn"
						aria-label="Open Projects board (opens in new tab)"
						data-tooltip="Access individual project boards and spaces">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
							<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
							<line x1="9" y1="3" x2="9" y2="21"></line>
						</svg>
						<span>Projects</span>
					</a>
					<button id="open-calendar-btn"
						class="planka-btn calendar-btn"
						aria-label="Open Calendar manager"
						data-tooltip="Open your integrated Google or Local Calendar">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
							<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
							<line x1="16" y1="2" x2="16" y2="6"></line>
							<line x1="8" y1="2" x2="8" y2="6"></line>
							<line x1="3" y1="10" x2="21" y2="10"></line>
						</svg>
						<span>Calendar</span>
					</button>
				</div>
			</header>

			<welcome-onboarding></welcome-onboarding>

			<section class="dashboard-card chat-card" id="section-chat" aria-label="Chat with Z">
				<chat-prompt></chat-prompt>
			</section>

			<section class="dashboard-card life-overview-card" id="section-life" aria-label="Life Overview">

				<create-project></create-project>
			</section>

			<section class="dashboard-card" id="section-calendar" aria-label="Calendar Agenda">
				<calendar-agenda></calendar-agenda>
			</section>

			</section>

			<section class="dashboard-card" id="section-memory" aria-label="Memory Search">
				<memory-search></memory-search>
			</section>

			<section class="dashboard-card" id="section-briefing" aria-label="Briefing History">

			</section>

			<section class="dashboard-card" id="section-personality" aria-label="Z Personality and Protocols">
				<z-personality></z-personality>
			</section>

			<section class="dashboard-card" id="section-inner" aria-label="Inner Circle — Family and Care">
				<circle-manager type="inner"></circle-manager>
			</section>

			<section class="dashboard-card" id="section-close" aria-label="Close Circle — Friends and Social">
				<circle-manager type="close"></circle-manager>
			</section>

			<section class="dashboard-card" id="section-outer" aria-label="Outer Circle — Acquaintances">
				<circle-manager type="outer"></circle-manager>
			</section>

			<section class="dashboard-card" id="section-email" aria-label="Email Intelligence Rules">
				<email-rules></email-rules>
			</section>

			<section class="dashboard-card" id="section-hardware" aria-label="Hardware Monitor">
				<hardware-monitor></hardware-monitor>
			</section>

			<section class="dashboard-card" id="section-software" aria-label="Software Status">
				<software-status></software-status>
			</section>

			<section class="dashboard-card" id="section-benchmark" aria-label="System Benchmark">
				<system-benchmark></system-benchmark>
			</section>

		<footer class="dashboard-footer">
			<p>openZero — Private AI Agent Operating System</p>
			<a href="https://github.com/niklasbrandt/openzero"
				target="_blank"

					</path>
				</svg>
				<span>GitHub</span>
			</a>
		</footer>
