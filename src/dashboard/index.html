	<!-- Instant theme paint: reads cached palette from localStorage before any
	     JS bundle executes, eliminating the flash of default teal on load.
	     Transitions are suppressed for one rAF so CSS var changes don't animate. -->
	<script>
		(function () {
			try {
				var r = document.documentElement;
				// Suppress all transitions so the var override paints instantly
				r.classList.add('no-transition');
				requestAnimationFrame(function () {
					r.classList.remove('no-transition');
				});
				var t = localStorage.getItem('z_theme');
				if (!t) return;
				var d = JSON.parse(t);
				function parseCol(c) {
					var m = /hsla?\(\s*([\d.]+)\s*,\s*([\d.]+)%\s*,\s*([\d.]+)%(?:\s*,\s*([\d.]+))?\s*\)/.exec(c);
					if (m) return { h: Math.round(+m[1]), s: Math.round(+m[2]), l: Math.round(+m[3]), a: m[4] !== undefined ? +m[4] : 1 };
					var h = c.replace('#', '');
					var R = parseInt(h.slice(0, 2), 16) / 255, G = parseInt(h.slice(2, 4), 16) / 255, B = parseInt(h.slice(4, 6), 16) / 255;
					var mx = Math.max(R, G, B), mn = Math.min(R, G, B), H = 0, s = 0, l = (mx + mn) / 2;
					if (mx !== mn) {
						var dv = mx - mn; s = l > 0.5 ? dv / (2 - mx - mn) : dv / (mx + mn);
						switch (mx) { case R: H = (G - B) / dv + (G < B ? 6 : 0); break; case G: H = (B - R) / dv + 2; break; case B: H = (R - G) / dv + 4; break; }H /= 6;
					}
					return { h: Math.round(H * 360), s: Math.round(s * 100), l: Math.round(l * 100), a: 1 };
				}
				function hslRgb(h, s, l) {
					s /= 100; l /= 100;
					var k = function (n) { return (n + h / 30) % 12; };
					var a = s * Math.min(l, 1 - l);
					var f = function (n) { return l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1))); };
					return Math.round(f(0) * 255) + ', ' + Math.round(f(8) * 255) + ', ' + Math.round(f(4) * 255);
				}
				if (d.accent) {
					var p = parseCol(d.accent);
					var pRgb = hslRgb(p.h, p.s, p.l);
					r.style.setProperty('--accent-primary-h', p.h);
					r.style.setProperty('--accent-primary-s', p.s + '%');
					r.style.setProperty('--accent-primary-l', p.l + '%');
					r.style.setProperty('--accent-primary-rgb', pRgb);
					r.style.setProperty('--accent-primary', 'hsla(' + p.h + ', ' + p.s + '%, ' + p.l + '%, ' + p.a + ')');
					r.style.setProperty('--accent-color', 'hsla(' + p.h + ', ' + p.s + '%, ' + p.l + '%, ' + p.a + ')');
					r.style.setProperty('--accent-color-rgb', pRgb);
					r.style.setProperty('--accent-glow', 'rgba(' + pRgb + ', 0.4)');
				}
				if (d.secondary) {
					var s2 = parseCol(d.secondary);
					var s2Rgb = hslRgb(s2.h, s2.s, s2.l);
					r.style.setProperty('--accent-secondary-h', s2.h);
					r.style.setProperty('--accent-secondary-s', s2.s + '%');
					r.style.setProperty('--accent-secondary-l', s2.l + '%');
					r.style.setProperty('--accent-secondary-rgb', s2Rgb);
					r.style.setProperty('--accent-secondary', 'hsla(' + s2.h + ', ' + s2.s + '%, ' + s2.l + '%, ' + s2.a + ')');
				}
				if (d.tertiary) {
					var tt = parseCol(d.tertiary);
					var ttRgb = hslRgb(tt.h, tt.s, tt.l);
					r.style.setProperty('--accent-tertiary-h', tt.h);
					r.style.setProperty('--accent-tertiary-s', tt.s + '%');
					r.style.setProperty('--accent-tertiary-l', tt.l + '%');
					r.style.setProperty('--accent-tertiary-rgb', ttRgb);
					r.style.setProperty('--accent-tertiary', 'hsla(' + tt.h + ', ' + tt.s + '%, ' + tt.l + '%, ' + tt.a + ')');
				}
			} catch (e) { }
		})();
	</script>
