<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>openZero Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="sidebar-nav" aria-label="Widget navigation">
        <a href="#section-chat" data-section="section-chat" aria-label="Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </a>
        <a href="#section-life" data-section="section-life" aria-label="Life Overview">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </a>
        <a href="#section-calendar" data-section="section-calendar" aria-label="Calendar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </a>
        <a href="#section-identity" data-section="section-identity" aria-label="Identity">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
        <a href="#section-memory" data-section="section-memory" aria-label="Memory">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </a>
        <a href="#section-briefing" data-section="section-briefing" aria-label="Briefings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
        </a>
        <a href="#section-personality" data-section="section-personality" aria-label="Personality">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 5a3 3 0 1 1-3 3 3 3 0 0 1 3-3zm0 13a8 8 0 0 1-6-2.68 3 3 0 0 1 2.84-2.32h6.32A3 3 0 0 1 18 17.32 8 8 0 0 1 12 20z"></path></svg>
        </a>
        <div class="nav-divider"></div>
        <a href="#section-inner" data-section="section-inner" aria-label="Inner Circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </a>
        <a href="#section-email" data-section="section-email" aria-label="Email Rules">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </a>
        <div class="nav-divider"></div>
        <a href="#section-hardware" data-section="section-hardware" aria-label="Hardware">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
        </a>
        <a href="#section-software" data-section="section-software" aria-label="Software">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        </a>
        <a href="#section-benchmark" data-section="section-benchmark" aria-label="Benchmark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        </a>
    </nav>
    <div id="app">
        <div class="dashboard-header">
            <h1>openZero <span class="gradient-text">Dashboard</span></h1>
            <div class="header-actions">
                <a href="/api/dashboard/planka-redirect?target=operator" target="_blank" class="planka-btn operator-btn"
                    data-tooltip="Centralized overview of tasks across all your boards">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <span>Operator Board</span>
                </a>
                <a href="/api/dashboard/planka-redirect" target="_blank" class="planka-btn"
                    data-tooltip="Access individual project boards and spaces">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                    <span>Projects</span>
                </a>
                <button onclick="window.dispatchEvent(new CustomEvent('open-calendar'))" class="planka-btn calendar-btn"
                    data-tooltip="Open your integrated Google or Local Calendar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span>Calendar</span>
                </button>
            </div>
        </div>

        <welcome-onboarding></welcome-onboarding>

        <div class="dashboard-card chat-card" id="section-chat">
            <chat-prompt></chat-prompt>
        </div>

        <div class="dashboard-card life-overview-card" id="section-life">
            <life-overview></life-overview>
            <create-project></create-project>
        </div>

        <div class="dashboard-card" id="section-calendar">
            <calendar-agenda></calendar-agenda>
        </div>

        <div class="dashboard-card" id="section-identity">
            <user-card></user-card>
        </div>

        <div class="dashboard-card" id="section-memory">
            <memory-search></memory-search>
        </div>

        <div class="dashboard-card" id="section-briefing">
            <briefing-history></briefing-history>
        </div>

        <div class="dashboard-card" id="section-personality">
            <z-personality></z-personality>
        </div>

        <div class="dashboard-card" id="section-inner">
            <circle-manager type="inner"></circle-manager>
        </div>

        <div class="dashboard-card" id="section-close">
            <circle-manager type="close"></circle-manager>
        </div>

        <div class="dashboard-card" id="section-outer">
            <circle-manager type="outer"></circle-manager>
        </div>

        <div class="dashboard-card" id="section-email">
            <email-rules></email-rules>
        </div>

        <div class="dashboard-card" id="section-hardware">
            <hardware-monitor></hardware-monitor>
        </div>

        <div class="dashboard-card" id="section-software">
            <software-status></software-status>
        </div>

        <div class="dashboard-card" id="section-benchmark">
            <system-benchmark></system-benchmark>
        </div>
    </div>
    <div class="dashboard-footer">
        <p>openZero — Private AI Agent Operating System</p>
        <a href="https://github.com/niklasbrandt/openzero" target="_blank" class="github-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                </path>
            </svg>
            <span>GitHub</span>
        </a>
    </div>
    <calendar-manager></calendar-manager>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
