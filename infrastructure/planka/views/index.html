    <script>
      /* Seed dark theme before Planka's React app reads localStorage.
         Only sets a value when the user has not already chosen a preference. */
      (function () {
        var keys = ['themeType', 'theme'];
        for (var i = 0; i < keys.length; i++) {
          if (!localStorage.getItem(keys[i])) {
            localStorage.setItem(keys[i], 'dark');
          }
        }
      }());
    </script>
