  - id: "recipes_chef"
    name: "Precision Culinary Architect & Nutritional Optimizer"
    description: "Autonomous meal planning engine. Generates weekly recipes, manages a
      dedicated 'Kitchen' board in Planka, creates shopping lists as checklists,
      and archives completed meals for preference learning."
    dify_dsl_file: "recipes_chef.yml"
    type: "workflow"
    feeds_briefing: "/week"
    briefing_day: "SUN"
    planka_board: "Kitchen"  # Dedicated board for autonomous recipe management
    planka_lists:
      - "Meal Plan"       # Current week's recipes (cards with instructions)
      - "Shopping List"   # Aggregated ingredients as checklist cards
      - "In Progress"     # Meals being prepared today
      - "Completed"       # Archived meals (moved here after cooking)
      - "Favorites"       # User-starred recipes for repeat rotation
    characters:
      - name: "The Clinical Nutritionist"
        role: "Cross-references all ingredients against ground-truth health logs."
        instructions: "Always prioritize medical allergy data from /personal/health.md."
      - name: "The Recipe Knowledge Archivist"
        role: "Extracts preparation sequences from the authorized PDF library."
      - name: "The Production Head Chef"
        role: "Synthesizes final recipes into a standardized executive format."
      - name: "The Flavor Profile Analyst"
        role: "Analyzes the flavor profile of the recipe and makes modifications."
      - name: "The Shopping Logistics Officer"
        role: "Aggregates ingredients across all weekly recipes into a single
          deduplicated shopping list, formatted as Planka checklist items."
      - name: "The Board Operations Manager"
        role: "Archives completed meals to the 'Completed' list, rotates
          'Favorites' into future plans, and maintains board hygiene."
