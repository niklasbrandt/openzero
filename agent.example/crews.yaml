# yaml-language-server: $schema=../docs/schemas/crews.schema.json
# openZero Dify Crew Configuration Template
# ==========================================
# IMPORTANCE OF SEMANTIC PRIMING & ROLE SPECIFICITY:
# ==========================================
# Defining hyper-specific names and roles is critical for "Semantic Priming."
# By replacing generic titles (e.g., "Chef") with specific archetypes (e.g., "Precision Culinary Architect"),
# you prime the underlying LLM to adopt a more rigorous, expert-level reasoning pattern.
# This reduces hallucinations, improves adherence to constraints, and ensures output
# logic aligns with high-level professional standards rather than general conversational
# patterns. Each name here is a "Cognitive Trigger" for quality.
#
# ==========================================
# DIFY DSL FILE NAMING & PROVISIONING:
# ==========================================
# The "dify_dsl_file" property dictates the EXACT filename of the exported Dify
# Workflow/Agent YAML that openZero expects to find in your 'dify/' root directory.
#
# WHY IT MATTERS: The openZero Dify Provisioning Engine relies on this filename
# to automatically locate the exported logic, parse it, and construct it inside Dify.
# If this filename does not perfectly match the physical file, auto-provisioning
# will fail when you uncomment a crew.
#
# NAMING CONVENTION:
# ALWAYS name the DSL file identically to the crew's 'id', appended with '.yml'.
#   Example: If id is "market_scout", dify_dsl_file MUST BE "market_scout.yml".
# This maintains strict zero-config mapping integrity.
#
# SCHEDULING & BRIEFING ALIGNMENT:
# ==========================================
# Crews can be scheduled in two ways:
#
# 1. BRIEFING-RELATIVE (recommended):
#    Use "feeds_briefing" to declare which briefing cadence a crew feeds.
#    The scheduler dynamically computes the run time as:
#      run_time = user_briefing_time - crew_lead_time_minutes
#    This ensures crews always finish BEFORE the briefing assembles,
#    regardless of when the user configures their briefing.
#
#    Fields:
#      feeds_briefing: "/day" | "/week" | "/month" | "/quarter" | "/year"
#      briefing_day: "MON" | "SUN" | "FRI" | etc. (for /week cadence)
#      briefing_dom: 1 | 15 | "1,15" (day-of-month, for /month cadence)
#      briefing_months: "1,4,7,10" (for /quarter cadence)
#      lead_time: 120 (optional per-crew override in minutes)
#
# 2. FIXED CRON (for non-briefing crews):
#    Use "schedule" with standard 5-field cron syntax for crews that
#    run independently of briefings (e.g., on-demand, afternoon runs).
#      schedule: "minute hour day-of-month month day-of-week"
#
# Quiet hours are enforced globally by the openZero scheduler.
# By default, crews computed to run between 00:00 and 06:00 are pushed forward
# to 06:00. This logic (enable/disable, and exact start/end bounds) can now
# be customized via your Identity Configuration widget in the Dashboard.

# Global lead time: how many minutes before briefing time crews should start.
# Adjust this based on your typical crew execution duration.
crew_lead_time_minutes: 90

crews:
  # ==========================================
  # UNIVERSAL CORE (Agentic Operating System)
  # ==========================================
  - id: "flow_optimizer"
    name: "Stagnation Auditor & workflow Strategist"
    description: "Detects digital bottlenecks in Planka and scaffolds 'Unblocker' micro-sequences."
    dify_dsl_file: "flow_optimizer.yml"
    type: "workflow"
    instructions: |
      Act as a Senior Productivity Architect.
      Scan the input context for tasks that lack recent activity.
      Categorize them and propose highly actionable tiny "unblocker" steps instead of large goals.
      Always format your output in clean Markdown.
    feeds_briefing: "/week"
    briefing_day: "MON"
    characters:
      - name: "The Systems Auditor"
        role: "Monitors cross-board activity for stagnant cards and deadlocks."
      - name: "The Optimization Strategist"
        role: "Synthesizes actionable 'Unblocker' tasks and assigns priority tokens."

  - id: "context_researcher"
    name: "Deep Intelligence Scholar & Synthesis Architect"
    description: "Executes extreme-scale research and generates ground-truth 'White Papers' in memory."
    dify_dsl_file: "context_researcher.yml"
    type: "agent"
    # No schedule -- triggered on-demand via conversation.
    # lead_time: 180  # Example override: deep research takes longer
    characters:
      - name: "The Primary Scholar"
        role: "Performs deep-dive recursive search across multi-vector knowledge sources."
      - name: "The Synthesis Architect"
        role: "Abstracts raw data into high-density strategic executive summaries."

  - id: "structure_architect"
    name: "Systemic Workspace Architect"
    description: "Automates the deployment of complex board hierarchies and card structures."
    dify_dsl_file: "structure_architect.yml"
    type: "workflow"
    # No schedule -- triggered on-demand when Z detects a new project or goal.
    characters:
      - name: "The Blueprint Designer"
        role: "Maps high-level goals into structural kanban nodes and list hierarchies."
      - name: "The Logistics Automation Specialist"
        role: "Executes the programmatic creation of cards and metadata labels."

