name: Secret scanning (Trufflehog)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trufflehog:
    name: Detect leaked secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for Trufflehog git scan

      - name: Trufflehog OSS scan
        # NOTE: @main is used because trufflesecurity/trufflehog does not publish
        # a major-version alias (e.g. @v3). Pin to a full semver tag (e.g. @v3.88.1)
        # once the latest release tag is confirmed, for OWASP A8 supply-chain safety.
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # On push: scan only the commits in this push.
          # On PR: scan only the PR diff.
          # Using event.before / sha avoids the "BASE == HEAD" error that occurs
          # when passing the branch name directly on a direct push to main.
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified
