name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend type-check ──────────────────────────────────────────────────────
  frontend:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/dashboard/package.json

      - name: Install dependencies
        working-directory: src/dashboard
        run: npm ci

      - name: TypeScript strict type-check
        working-directory: src/dashboard
        run: node_modules/.bin/tsc --noEmit

  # ── Backend syntax-check ─────────────────────────────────────────────────────
  backend:
    name: Python syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet httpx asyncio fastapi sqlalchemy pydantic aiohttp

      - name: Syntax-check all backend modules
        run: |
          find src/backend/app -name "*.py" -exec python3 -m py_compile {} +
          echo "Backend syntax OK"

      - name: Verify translation keys are balanced (EN=DE)
        run: |
          python3 - << 'EOF'
          import ast, sys

          with open("src/backend/app/services/translations.py") as f:
              src = f.read()

          tree = ast.parse(src)
          dicts = {}
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if isinstance(t, ast.Name) and t.id.startswith('_'):
                          if isinstance(node.value, ast.Dict):
                              keys = [k.s for k in node.value.keys if isinstance(k, ast.Constant)]
                              dicts[t.id] = set(keys)

          en_keys = dicts.get('_EN', set())
          de_keys = dicts.get('_DE', set())
          missing_de = en_keys - de_keys

          if missing_de:
              aria_missing = [k for k in missing_de if k.startswith('aria_')]
              non_aria = [k for k in missing_de if not k.startswith('aria_')]
              if aria_missing:
                  print(f"WARNING: {len(aria_missing)} aria keys in _EN but not _DE: {sorted(aria_missing)[:10]}")
              if non_aria:
                  print(f"FAIL: {len(non_aria)} non-aria keys in _EN but not _DE: {sorted(non_aria)[:10]}")
                  sys.exit(1)
          else:
              print(f"OK: _DE has all {len(en_keys)} keys from _EN")
          EOF

  # ── Build smoke-test (Docker) ─────────────────────────────────────────────────
  build:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f src/backend/Dockerfile -t openzero-backend-ci .

      - name: Build dashboard (vite build)
        working-directory: src/dashboard
        run: |
          npm ci
          npm run build
