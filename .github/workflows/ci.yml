name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend type-check ──────────────────────────────────────────────────────
  frontend:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/dashboard/package.json

      - name: Install dependencies
        working-directory: src/dashboard
        run: npm ci

      - name: TypeScript strict type-check
        working-directory: src/dashboard
        run: node_modules/.bin/tsc --noEmit

      - name: npm audit (high severity)
        working-directory: src/dashboard
        run: npm audit --audit-level=high

  # ── Backend syntax-check ─────────────────────────────────────────────────────
  backend:
    name: Python syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet httpx asyncio fastapi sqlalchemy pydantic aiohttp

      - name: Syntax-check all backend modules
        run: |
          find src/backend/app -name "*.py" -exec python3 -m py_compile {} +
          echo "Backend syntax OK"

      - name: Verify translation keys are balanced (EN=DE)
        run: |
          python3 - << 'EOF'
          import ast, sys

          with open("src/backend/app/services/translations.py") as f:
              src = f.read()

          tree = ast.parse(src)
          dicts = {}
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if isinstance(t, ast.Name) and t.id.startswith('_'):
                          if isinstance(node.value, ast.Dict):
                              keys = [k.s for k in node.value.keys if isinstance(k, ast.Constant)]
                              dicts[t.id] = set(keys)

          en_keys = dicts.get('_EN', set())
          de_keys = dicts.get('_DE', set())
          missing_de = en_keys - de_keys

          if missing_de:
              aria_missing = [k for k in missing_de if k.startswith('aria_')]
              non_aria = [k for k in missing_de if not k.startswith('aria_')]
              if aria_missing:
                  print(f"WARNING: {len(aria_missing)} aria keys in _EN but not _DE: {sorted(aria_missing)[:10]}")
              if non_aria:
                  print(f"FAIL: {len(non_aria)} non-aria keys in _EN but not _DE: {sorted(non_aria)[:10]}")
                  sys.exit(1)
          else:
              print(f"OK: _DE has all {len(en_keys)} keys from _EN")
          EOF

  # ── Accessibility audit (axe-core + Playwright) ──────────────────────────────
  accessibility:
    name: Accessibility audit (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: [frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/dashboard/package.json

      - name: Install dependencies
        working-directory: src/dashboard
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        working-directory: src/dashboard
        run: npx playwright install --with-deps chromium

      - name: Build dashboard (production bundle)
        working-directory: src/dashboard
        run: npm run build

      - name: Run accessibility tests
        working-directory: src/dashboard
        run: npx playwright test tests/accessibility.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: src/dashboard/playwright-report/
          retention-days: 7

  # ── Security — prompt injection tests ───────────────────────────────────────
  security:
    name: Security — prompt injection (268 tests)
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install --quiet pytest

      - name: Run prompt injection test suite
        run: python -m pytest tests/test_security_prompt_injection.py -v --tb=short

  # ── Python linting (ruff) ────────────────────────────────────────────────────
  lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Lint backend
        run: ruff check src/backend/app/

  # ── Static security analysis (bandit) ────────────────────────────────────────
  sast:
    name: SAST — bandit security scan
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install --quiet bandit

      - name: Run bandit (high-severity only)
        run: bandit -r src/backend/app/ -ll -ii --skip B603,B607 -q

  # ── Dependency audit (pip-audit / OWASP A6) ──────────────────────────────────
  dep-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    needs: [backend]
    # Hardened: no longer continue-on-error.
    # torch and pymupdf carry known upstream unfixed CVEs — they are exempted.
    # Any CVE in a package we control will fail the build.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install --quiet pip-audit

      - name: Audit Python dependencies
        run: |
          pip-audit -r src/backend/requirements.txt --progress-spinner off \
            --format json -o /tmp/pip-audit.json || true
          python3 - << 'EOF'
          import json, sys
          EXEMPTED = {"torch", "pymupdf", "fitz", "pymupdf-fonts"}
          try:
              with open("/tmp/pip-audit.json") as f:
                  data = json.load(f)
          except Exception as e:
              print(f"Could not read audit output: {e}")
              sys.exit(1)
          failures = []
          for dep in data.get("dependencies", []):
              if dep.get("vulns"):
                  pkg = dep["name"].lower().replace("-", "_")
                  if pkg not in EXEMPTED:
                      for v in dep["vulns"]:
                          failures.append(
                              f"{dep['name']}@{dep['version']}: {v['id']} "
                              f"— {v.get('description','')[:100]}"
                          )
          if failures:
              print("FAIL: CVEs in non-exempted packages:")
              for line in failures:
                  print(f"  {line}")
              sys.exit(1)
          else:
              print("OK: No CVEs in controlled packages (torch/pymupdf exempted).")
          EOF

  # ── Build smoke-test (Docker) ─────────────────────────────────────────────────
  build:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, lint, sast]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/backend/Dockerfile
          tags: openzero-backend-ci:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy container scan (CRITICAL/HIGH CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: openzero-backend-ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build dashboard (vite build)
        working-directory: src/dashboard
        run: |
          npm ci
          npm run build
