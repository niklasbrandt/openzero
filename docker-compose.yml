services:

  postgres:
    image: postgres:16-alpine
    restart: always
    # No external port binding — accessed only by internal services
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    # No external port binding — accessed only by backend
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  ollama:
    image: ollama/ollama:0.5.7
    restart: always
    # No external port binding — accessed only by backend
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: [ "/bin/bash", "/entrypoint.sh" ]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODEL=${OLLAMA_MODEL_FAST}
      - OLLAMA_MODEL_SMART=${OLLAMA_MODEL_SMART}
    networks:
      - internal

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: always
    networks:
      - internal

  tts:
    image: ghcr.io/matatonic/openedai-speech:latest
    restart: always
    networks:
      - internal

  planka:
    image: ghcr.io/plankanban/planka:latest
    restart: always
    # No external port binding — routed through Traefik only
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.planka
    volumes:
      - planka_avatars:/app/public/user-avatars
      - planka_backgrounds:/app/public/project-background-images
      - planka_attachments:/app/private/attachments
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.p1.rule=PathPrefix(\"/planka\")"
      - "traefik.http.routers.p2.rule=PathPrefix(\"/boards\")"
      - "traefik.http.routers.p3.rule=PathPrefix(\"/projects\")"
      - "traefik.http.routers.p4.rule=PathPrefix(\"/cards\")"
      - "traefik.http.routers.p5.rule=PathPrefix(\"/assets\")"
      - "traefik.http.routers.p6.rule=PathPrefix(\"/api\") && !PathPrefix(\"/api/dashboard\")"
      - "traefik.http.routers.p7.rule=PathPrefix(\"/socket.io\")"
      - "traefik.http.routers.p8.rule=PathPrefix(\"/attachments\") || PathPrefix(\"/user-avatars\") || PathPrefix(\"/project-background-images\")"
      - "traefik.http.routers.p9.rule=Path(\"/manifest.json\") || Path(\"/favicon.ico\") || Path(\"/logo192.png\")"
      - "traefik.http.routers.p10.rule=PathPrefix(\"/login\")"
      - "traefik.http.routers.p1.entrypoints=web"
      - "traefik.http.routers.p1.service=planka"
      - "traefik.http.routers.p2.entrypoints=web"
      - "traefik.http.routers.p2.service=planka"
      - "traefik.http.routers.p3.entrypoints=web"
      - "traefik.http.routers.p3.service=planka"
      - "traefik.http.routers.p4.entrypoints=web"
      - "traefik.http.routers.p4.service=planka"
      - "traefik.http.routers.p5.entrypoints=web"
      - "traefik.http.routers.p5.service=planka"
      - "traefik.http.routers.p6.entrypoints=web"
      - "traefik.http.routers.p6.service=planka"
      - "traefik.http.routers.p7.entrypoints=web"
      - "traefik.http.routers.p7.service=planka"
      - "traefik.http.routers.p8.entrypoints=web"
      - "traefik.http.routers.p8.service=planka"
      - "traefik.http.routers.p9.entrypoints=web"
      - "traefik.http.routers.p9.service=planka"
      - "traefik.http.routers.p10.entrypoints=web"
      - "traefik.http.routers.p10.service=planka"
      - "traefik.http.routers.p1.priority=10"
      - "traefik.http.routers.p2.priority=10"
      - "traefik.http.routers.p3.priority=10"
      - "traefik.http.routers.p4.priority=10"
      - "traefik.http.routers.p5.priority=10"
      - "traefik.http.routers.p6.priority=10"
      - "traefik.http.routers.p7.priority=100"
      - "traefik.http.routers.p8.priority=10"
      - "traefik.http.routers.p9.priority=10"
      - "traefik.http.routers.p10.priority=10"
      - "traefik.http.services.planka.loadbalancer.server.port=1337"
      - "traefik.docker.network=openzero_internal"

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    env_file: .env
    environment:
      - TRUST_PROXY=true
      - PYTHONUNBUFFERED=1
    volumes:
      - gmail_tokens:/app/tokens
    networks:
      - internal
    # No external port — Traefik handles routing
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.priority=1"
      - "traefik.docker.network=openzero_internal"

  traefik:
    image: traefik:v2.11
    restart: always
    command:
      # api.insecure removed — Traefik dashboard is disabled
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=WARN"
    ports:
      - "80:80"
      # Port 8080 (Traefik dashboard) intentionally not exposed
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - DOCKER_API_VERSION=1.53
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal
    volumes:
      - redis_data:/data

  pihole:
    image: pihole/pihole:latest
    restart: always
    cap_add:
      - NET_ADMIN
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      - TZ=${USER_TIMEZONE:-Europe/Berlin}
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - DNS1=1.1.1.1
      - DNS2=9.9.9.9
      - PIHOLE_DOMAIN=open.zero
      - FTLCONF_LOCAL_IPV4=${SERVER_IP}
      - DNSMASQ_LISTENING=all
      - DNSMASQ_USER=root
    extra_hosts:
      - "open.zero:${SERVER_IP}"
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.pihole.entrypoints=web"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "traefik.docker.network=openzero_internal"

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  qdrant_data:
  ollama_data:
  planka_avatars:
  planka_backgrounds:
  planka_attachments:
  gmail_tokens:
  tts_models:
  redis_data:
  pihole_config:
  pihole_dnsmasq:
