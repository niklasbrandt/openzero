services:

  postgres:
    image: postgres:16.8-alpine3.21
    restart: always
    # No external port binding — accessed only by internal services
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: always
    # No external port binding — accessed only by backend
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  # --- 2-Tier Local Intelligence (llama-server / llama.cpp) ---
  # fast: small fast model for trivial tasks; deep: full 8B for everything else.
  # See .env.example for hardware sizing guide and model recommendations.

  llm-fast:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: always
    volumes:
      - llm_models:/models
      - ./scripts/llm-entrypoint.sh:/entrypoint.sh
    entrypoint: [ "/bin/bash", "/entrypoint.sh" ]
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    environment:
      - MODEL_URL=${LLM_FAST_MODEL_URL}
      - MODEL_FILE=${LLM_FAST_MODEL_FILE:-Qwen3-0.6B-Q4_K_M.gguf}
      - KEEP_MODELS=${LLM_FAST_MODEL_FILE:-Qwen3-0.6B-Q4_K_M.gguf},${LLM_DEEP_MODEL_FILE:-Qwen3-8B-Q4_K_M.gguf}
      - PORT=8081
      - THREADS=${LLM_FAST_THREADS:-4}
      - CTX_SIZE=${LLM_FAST_CTX:-4096}
      - N_PREDICT=${LLM_FAST_PREDICT:-512}
      - BATCH_SIZE=${LLM_FAST_BATCH:-512}
      - PARALLEL=${LLM_FAST_PARALLEL:-1}
      - LLM_CACHE_RAM=${LLM_FAST_CACHE_RAM:-256}
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8081/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - llm

  llm-deep:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: always
    volumes:
      - llm_models:/models
      - ./scripts/llm-entrypoint.sh:/entrypoint.sh
    entrypoint: [ "/bin/bash", "/entrypoint.sh" ]
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    environment:
      - MODEL_URL=${LLM_DEEP_MODEL_URL}
      - MODEL_FILE=${LLM_DEEP_MODEL_FILE:-Qwen3-8B-Q4_K_M.gguf}
      - KEEP_MODELS=${LLM_FAST_MODEL_FILE:-Qwen3-0.6B-Q4_K_M.gguf},${LLM_DEEP_MODEL_FILE:-Qwen3-8B-Q4_K_M.gguf}
      - PORT=8083
      - THREADS=${LLM_DEEP_THREADS:-4}
      - CTX_SIZE=${LLM_DEEP_CTX:-6144}
      - N_PREDICT=${LLM_DEEP_PREDICT:-4096}
      - BATCH_SIZE=${LLM_DEEP_BATCH:-512}
      - PARALLEL=${LLM_DEEP_PARALLEL:-1}
      - LLM_CACHE_RAM=${LLM_DEEP_CACHE_RAM:-1024}
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8083/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    networks:
      - llm

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.9.1
    restart: always
    deploy:
      resources:
        limits:
          memory: 1536M
    networks:
      - internal

  tts:
    image: ghcr.io/matatonic/openedai-speech:0.18.2
    restart: always
    deploy:
      resources:
        limits:
          memory: 1536M
    networks:
      - internal

  planka:
    image: ghcr.io/plankanban/planka:2.0.3
    restart: always
    # No external port binding — routed through Traefik only
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.planka
    volumes:
      - planka_avatars:/app/public/user-avatars
      - planka_backgrounds:/app/public/project-background-images
      - planka_attachments:/app/private/attachments
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.p1.rule=PathPrefix(\"/planka\")"
      - "traefik.http.routers.p2.rule=PathPrefix(\"/boards\")"
      - "traefik.http.routers.p3.rule=PathPrefix(\"/projects\")"
      - "traefik.http.routers.p4.rule=PathPrefix(\"/cards\")"
      - "traefik.http.routers.p5.rule=PathPrefix(\"/assets\")"
      - "traefik.http.routers.p6.rule=PathPrefix(\"/api\") && !PathPrefix(\"/api/dashboard\")"
      - "traefik.http.routers.p7.rule=PathPrefix(\"/socket.io\")"
      - "traefik.http.routers.p8.rule=PathPrefix(\"/attachments\") || PathPrefix(\"/user-avatars\") || PathPrefix(\"/project-background-images\")"
      - "traefik.http.routers.p9.rule=Path(\"/manifest.json\") || Path(\"/favicon.ico\") || Path(\"/logo192.png\")"
      - "traefik.http.routers.p10.rule=PathPrefix(\"/login\")"
      - "traefik.http.routers.p1.entrypoints=web"
      - "traefik.http.routers.p1.service=planka"
      - "traefik.http.routers.p2.entrypoints=web"
      - "traefik.http.routers.p2.service=planka"
      - "traefik.http.routers.p3.entrypoints=web"
      - "traefik.http.routers.p3.service=planka"
      - "traefik.http.routers.p4.entrypoints=web"
      - "traefik.http.routers.p4.service=planka"
      - "traefik.http.routers.p5.entrypoints=web"
      - "traefik.http.routers.p5.service=planka"
      - "traefik.http.routers.p6.entrypoints=web"
      - "traefik.http.routers.p6.service=planka"
      - "traefik.http.routers.p7.entrypoints=web"
      - "traefik.http.routers.p7.service=planka"
      - "traefik.http.routers.p8.entrypoints=web"
      - "traefik.http.routers.p8.service=planka"
      - "traefik.http.routers.p9.entrypoints=web"
      - "traefik.http.routers.p9.service=planka"
      - "traefik.http.routers.p10.entrypoints=web"
      - "traefik.http.routers.p10.service=planka"
      - "traefik.http.routers.p1.priority=10"
      - "traefik.http.routers.p2.priority=10"
      - "traefik.http.routers.p3.priority=10"
      - "traefik.http.routers.p4.priority=10"
      - "traefik.http.routers.p5.priority=10"
      - "traefik.http.routers.p6.priority=10"
      - "traefik.http.routers.p7.priority=100"
      - "traefik.http.routers.p8.priority=10"
      - "traefik.http.routers.p9.priority=10"
      - "traefik.http.routers.p10.priority=10"
      - "traefik.http.routers.p1.middlewares=error-pages-middleware"
      - "traefik.http.routers.p2.middlewares=error-pages-middleware"
      - "traefik.http.routers.p3.middlewares=error-pages-middleware"
      - "traefik.http.routers.p4.middlewares=error-pages-middleware"
      - "traefik.http.routers.p5.middlewares=error-pages-middleware"
      - "traefik.http.routers.p6.middlewares=error-pages-middleware"
      - "traefik.http.routers.p7.middlewares=error-pages-middleware"
      - "traefik.http.routers.p8.middlewares=error-pages-middleware"
      - "traefik.http.routers.p9.middlewares=error-pages-middleware"
      - "traefik.http.routers.p10.middlewares=error-pages-middleware"
      - "traefik.http.services.planka.loadbalancer.server.port=1337"
      - "traefik.docker.network=openzero_internal"

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      llm-fast:
        condition: service_started
      llm-deep:
        condition: service_started
    env_file: .env
    environment:
      - TRUST_PROXY=true
      - PYTHONUNBUFFERED=1
    volumes:
      - gmail_tokens:/app/tokens
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent:/app/agent
      - ./personal:/app/personal
      - ./docker-compose.yml:/app/compose.yml:ro
    group_add:
      - "988"  # docker socket GID on VPS host (getent group docker | cut -d: -f3)
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "pihole:host-gateway"
    networks:
      - internal
      - llm
    # No external port — Traefik handles routing
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.priority=1"
      - "traefik.http.routers.backend.middlewares=error-pages-middleware"
      - "traefik.docker.network=openzero_internal"

  error-page:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./src/error-pages:/usr/share/nginx/html:ro
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.error-page.rule=PathPrefix(`/error-page`)"
      - "traefik.http.services.error-page.loadbalancer.server.port=80"
      - "traefik.http.middlewares.error-pages-middleware.errors.service=error-page"
      - "traefik.http.middlewares.error-pages-middleware.errors.status=400-599"
      - "traefik.http.middlewares.error-pages-middleware.errors.query=/?status={status}"
      - "traefik.docker.network=openzero_internal"

  traefik:
    image: traefik:v2.11
    restart: always
    command:
      # api.insecure removed — Traefik dashboard is disabled
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=WARN"
    ports:
      # Bind to TAILSCALE_IP when set so port 80 is only reachable via the
      # Tailscale mesh. Default 0.0.0.0 preserves behaviour for fresh
      # deployments that have not yet set up Tailscale.
      - "${TAILSCALE_IP:-0.0.0.0}:80:80"
      # Port 8080 (Traefik dashboard) intentionally not exposed
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - DOCKER_API_VERSION=1.53
    networks:
      - internal

  redis:
    image: redis:7.4-alpine3.21
    restart: always
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    networks:
      - internal
    volumes:
      - redis_data:/data

  pihole:
    image: pihole/pihole:2024.07.0
    restart: always
    network_mode: host
    shm_size: 256m
    cap_add:
      - NET_ADMIN
    healthcheck:
      # Test actual DNS resolution, not just the web UI — gravity.db corruption
      # makes the web UI healthy while DNS silently fails for all clients.
      test: [ "CMD", "dig", "@127.0.0.1", "open.zero", "+short", "+time=3" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    environment:
      - TZ=${USER_TIMEZONE:-Europe/Berlin}
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - DNS1=1.1.1.1
      - DNS2=9.9.9.9
      - PIHOLE_DOMAIN=open.zero
      - FTLCONF_LOCAL_IPV4=${SERVER_IP}
      - DNSMASQ_LISTENING=all
      - FTLCONF_dns_listeningMode=all
      - DNSMASQ_USER=root
      - WEBPORT=8081
      - FTLCONF_webserver_port=8081
      # Aggressive rate limiting: max 100 queries per 60s per client.
      # Default (1000/60s) is useless against distributed floods.
      - FTLCONF_RATE_LIMIT=100/60
    extra_hosts:
      - "open.zero:${SERVER_IP}"
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.pihole.entrypoints=web"
      - "traefik.http.services.pihole.loadbalancer.server.port=8081"
      - "traefik.http.services.pihole.loadbalancer.server.scheme=http"
      # L2: Restrict Pi-hole admin to Tailscale CGNAT range only
      - "traefik.http.middlewares.pihole-restrict.ipallowlist.sourcerange=100.64.0.0/10"
      - "traefik.http.routers.pihole.middlewares=pihole-restrict"

networks:
  internal:
    driver: bridge
  llm:
    driver: bridge
    # Isolated network for LLM inference containers.
    # Only the backend bridges both networks, preventing LLM containers
    # from reaching postgres, redis, or planka directly.

volumes:
  pgdata:
  qdrant_data:
  llm_models:
  planka_avatars:
  planka_backgrounds:
  planka_attachments:
  gmail_tokens:
  tts_models:
  redis_data:
  pihole_config:
  pihole_dnsmasq:
