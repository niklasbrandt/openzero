# yaml-language-server: $schema=../docs/schemas/crews.schema.json
# openZero Native Crew Configuration Template
# ==========================================
# IMPORTANCE OF SEMANTIC PRIMING & ROLE SPECIFICITY:
# ==========================================
# Defining hyper-specific names and roles is critical for "Semantic Priming."
# By replacing generic titles (e.g., "Chef") with specific archetypes (e.g., "Precision Culinary Architect"),
# you prime the underlying LLM to adopt a more rigorous, expert-level reasoning pattern.
# This reduces hallucinations, improves adherence to constraints, and ensures output
# logic aligns with high-level professional standards rather than general conversational
# patterns. Each name here is a "Cognitive Trigger" for quality.
# SCHEDULING & BRIEFING ALIGNMENT:
# ==========================================
# Crews can be scheduled in two ways:
#
# 1. BRIEFING-RELATIVE (recommended):
#    Use "feeds_briefing" to declare which briefing cadence a crew feeds.
#    The scheduler dynamically computes the run time as:
#      run_time = user_briefing_time - crew_lead_time_minutes
#    This ensures crews always finish BEFORE the briefing assembles,
#    regardless of when the user configures their briefing.
#
#    Fields:
#      feeds_briefing: "/day" | "/week" | "/month" | "/quarter" | "/year"
#      briefing_day: "MON" | "SUN" | "FRI" | etc. (for /week cadence)
#      briefing_dom: 1 | 15 | "1,15" (day-of-month, for /month cadence)
#      briefing_months: "1,4,7,10" (for /quarter cadence)
#      lead_time: 120 (optional per-crew override in minutes)
#
# 2. FIXED CRON (for non-briefing crews):
#    Use "schedule" with standard 5-field cron syntax for crews that
#    run independently of briefings (e.g., on-demand, afternoon runs).
#      schedule: "minute hour day-of-month month day-of-week"
#
# Quiet hours are enforced globally by the openZero scheduler.
# By default, crews computed to run between 00:00 and 06:00 are pushed forward
# to 06:00. This logic (enable/disable, and exact start/end bounds) can now
# be customized via your Identity Configuration widget in the Dashboard.

# Global lead time: how many minutes before briefing time crews should start.
# Adjust this based on your typical crew execution duration.
crew_lead_time_minutes: 90

crews:
  # ==========================================
  # UNIVERSAL CORE
  # ==========================================
  - id: "flow"
    name: "Productivity, Stagnation & Deep Work Engine"
    description: "Unblocks stuck tasks and schedules deep work execution."
    group: "basic"
    type: "agent"
    instructions: |
      Act as a Senior Productivity Architect. Scan the input context for tasks that lack recent activity.
      Propose actionable micro-tasks and identify optimal calendar blocks for deep work execution.
    feeds_briefing: "/week"
    briefing_day: "MON"
    characters:
      - name: "The Systems Auditor"
        role: "Flags deadlocked boards, deadline drift, and WIP violations."
      - name: "The Dependency Cartographer"
        role: "Maps circular blockers across internal and cross-functional projects."
      - name: "The Unblocker Strategist"
        role: "Outputs micro-tasks (under 25 min) to break inertia."
      - name: "The Session Architect"
        role: "Analyzes the calendar and schedules dedicated Pomodoro/Deep Work blocks into ideal energy windows."

  - id: "research"
    name: "Deep Intelligence Scholar & Synthesis Architect"
    description: "Executes extreme-scale research and generates ground-truth memory points."
    group: "basic"
    type: "agent"
    instructions: |
      Execute deep-dive research across multi-vector knowledge sources. Provide contrarian audits
      and distill findings into timestamped, confidence-tagged memory points.
    characters:
      - name: "The Primary Scholar"
        role: "Recursively searches multi-vector knowledge bases with credibility scoring."
      - name: "The Contrarian Auditor"
        role: "Actively hunts for conflicting evidence to prevent confirmation bias."
      - name: "The Synthesis Architect"
        role: "Abstracts findings into dense executive summaries."
      - name: "The Knowledge Archivist"
        role: "Distills findings into timestamped, confidence-tagged memory points for Qdrant."

  - id: "workspace"
    name: "Systemic Workspace Architect"
    description: "Auto-builds complex kanban structures via Planka API."
    group: "basic"
    type: "agent"
    instructions: |
      Translate high-level requests into programmatic Planka API structures representing optimal workflow layouts.
    characters:
      - name: "The Blueprint Designer"
        role: "Maps high-level goals into structural board/list topologies."
      - name: "The Methodology Advisor"
        role: "Applies framework rules (e.g., Kanban vs. Scrum vs. GTD)."
      - name: "The Scaffold Executor"
        role: "Programmatically mints the boards, lists, and seed cards."

